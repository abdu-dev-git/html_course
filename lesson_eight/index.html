<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form In Html</title>
  </head>
  <body>
    <!-- 
        Form => used to collect user input
        form tag
    -->
    <form action="" method="get">
      <!-- used to wrapp input elements -->
      <!-- 
        basic structure of inpu element
            - input tag - void tag
            type attribute => used to decide type of input
            name => used to handle that input
       -->
      <input name="first_name" type="text" />
      <br /><br />
      <!-- types of inputs 
        1. text type
        2. password
        3. email

        4. file 
      -->
      <input type="text" value="Abdu"/>
      <br /><br />
      <input type="password" name="" required id="" />
      <br /><br />
      <input type="email" placeholder="your_email@mail.com" name="" id="" />
      <br /><br />
      <input type="file" name="" id="" />
      <br /><br />
      <input type="color" name="" id="" />
      <br /><br />
      <input type="date" name="" id="" />

      <br /><br /><br />
      <input type="checkbox" name="choice" id="" />Banana
      <br />
      <input type="checkbox" name="choice" id="" />
      Cat
      <br /><br />
      <input type="radio" name="gender" id="" />Male
      <br />
      <input type="radio" name="gender" id="" />Female <br /><br /><br />
      <input type="number" name="" id="" />
      <br /><br />
      <input type="range" name="" id="" />

      <br />
      <textarea name="" id="" placeholder="sdjkdks"></textarea>
      <br><br>
      <button type="submit" >Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
