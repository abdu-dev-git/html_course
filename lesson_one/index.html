<!doctype html>
<!-- 
    - doctype declarition
    - ለbrowser html5ን እንዲጠቀም ይነግረዋል
-->
<html>
  <!-- Root element
        - entire page structure gors here 
    -->
  <head>
    <!--
        - metadata goes here 
        - seo
        - link to css file
        - link to icon for the page
        - link to js files
    -->
    <title>My Webpage</title>
  </head>
  <body>
    <!-- 
     - actual content goes here that should apear in browser window
    -->
     HI There
    <h1>Hello World</h1>
    Hello Guys
    <!-- 
    element -> combination of tag and content
        opaning tag + element + closing tag
    
    tag -> it is markup that tells the browser to do something on the content
        - opening tag -> tell the browser to start markup
            <tag>
        - closing tag -> tell the browser to stop markup
            </tag>
    -->
    <!-- This is comment
    comment -> a text that ignored by the browser from rendering it
     - used for devepers
     <h1> Bulllalalal </h1> 
    -->
  </body>
</html>
