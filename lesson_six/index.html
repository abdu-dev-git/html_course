<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Images</title>
  </head>
  <body>
    <h1>HTML images</h1>
    <!-- 
        img tag -> used to add images in our page.
            -> void tag
            -> src attribute used to tell the location of the picture

            -> alt attribute -> used to add alternative text 

            -> width -> set width of the picture
            -> height -> set height of the picture
    -->
    <img
      src="https://www.shutterstock.com/image-photo/cat-on-white-background-pet-260nw-2545741079.jpg"
    />
    <img src="./images/cat.jfif" alt="this is cat image" width="300" />

    <!-- 
        figure element -> used to show image semantically
    -->

    <figure>
      <img src="./images/cat.jfif" alt="" />
      <figcaption>Thus is cat image</figcaption>
    </figure>
  </body>
</html>
