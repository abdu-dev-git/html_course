<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html List</title>
</head>
<body>
    <h1>Html List</h1>
    <!-- 
    We have three types of list
        1. ordered list
            - listed with numbers
            to create order list 
                we use <ol></ol>
            - to list each  item we use
                <li></li>
        
        2. unordered list 
            - list that does not have number label
            - to create unordered list
                we use <ul></ul>
            - to list each  item we use
                <li></li>
        3. definition list
            - a list that has title
            - to create definition list 
                we use <dl></dl>
            - we use <dt></dt> tag to define the term
            - we use <dd></dd> to define the definition
    -->
    <ol>
        <li>Banana</li>
        <li>Orange</li>
    </ol>
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Register</li>
    </ul>
    <dl>
        <dt>HTML course catalog</dt>
        <dd>Lesson one: structure of html</dd>
        <dd>Lesson Two: Texts in HTML</dd>

        <dt>CSS Course catalog</dt>
        <dd>Lesson one: basics of css</dd>
        <dd>Lesson two: colors in css</dd>
    </dl>
    <!-- 
    - HTML attribute -> it is a property that give extra behavour for the element
        - syntax
            <elem attr="value"></elem>
    -->
    <ol start="4" type="a">
        <li>Lorem, ipsum.</li>
        <li>Sit, quis!</li>
        <li>Quia, aperiam!</li>
        <li>Vero, nesciunt.</li>
    </ol>
</body>
</html>
